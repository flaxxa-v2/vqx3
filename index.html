<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAXXA V1</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1a0000 0%, #0d0008 50%, #2b0004 100%);
            --panel-bg: rgba(20, 10, 12, 0.6);
            --border-color: rgba(255, 50, 50, 0.2);
            --accent-color: #ff3344;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            background: var(--bg-gradient);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 70px;
            background: rgba(10, 0, 3, 0.8);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 10;
        }

        .sidebar-logo {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 1.2rem;
            margin-bottom: 40px;
            cursor: pointer;
        }

        .sidebar-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .sidebar-btn:hover, .sidebar-btn.active {
            background: var(--panel-bg);
            border-color: var(--accent-color);
            color: var(--text-main);
        }

        /* Main Content Container */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }

        /* Dashboard Home View */
        .dashboard-home {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
        }

        .brand-title {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
            background: linear-gradient(to right, #ffffff, #ff6677);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        /* Search Bar */
        .search-container {
            width: 100%;
            max-width: 550px;
            position: relative;
            margin-bottom: 40px;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            padding-right: 80px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: border-color 0.2s ease;
        }

        .search-input:focus {
            border-color: var(--accent-color);
        }

        .search-hint {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 5px;
            pointer-events: none;
        }

        /* Hub Grid Navigation */
        .hub-grid {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 700px;
        }

        .hub-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            width: 85px;
            height: 85px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--text-muted);
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }

        .hub-card:hover {
            border-color: var(--accent-color);
            color: var(--text-main);
            transform: translateY(-2px);
        }

        .hub-card svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Workspace Wrapper for Iframes */
        .view-frame-wrapper {
            flex: 1;
            width: 100%;
            height: 100%;
            position: relative;
            background: #000;
        }

        .view-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #ffffff;
        }

        /* Floating Controls when iframe is open */
        .frame-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .control-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
        }

        .control-btn:hover {
            background: var(--accent-color);
            border-color: transparent;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo" onclick="showHome()">F1</div>
        <button class="sidebar-btn active" id="side-home" onclick="showHome()" title="Home">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </button>
        <button class="sidebar-btn" id="side-games" onclick="loadContent('games')" title="Games">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"></rect><path d="M6 12h4M8 10v4M15 11h.01M18 13h.01"></path></svg>
        </button>
        <button class="sidebar-btn" id="side-apps" onclick="loadContent('apps')" title="Apps">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
        </button>
    </div>

    <div class="main-container">
        
        <div class="dashboard-home" id="home-panel">
            <h1 class="brand-title">FLAXXA V1</h1>
            <p class="brand-subtitle">Your all-in-one hub</p>

            <div class="search-container">
                <input type="text" class="search-input" id="browser-search" placeholder="Search the web or enter URL..." onkeydown="handleSearch(event)">
                <span class="search-hint">Enter</span>
            </div>

            <div class="hub-grid">
                <div class="hub-card" onclick="loadContent('games')">
                    <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2Zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2Zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5Zm3-3c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5Z"/></svg>
                    <span>Games</span>
                </div>
                <div class="hub-card" onclick="loadContent('apps')">
                    <svg viewBox="0 0 24 24"><path d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
                    <span>Apps</span>
                </div>
                <div class="hub-card" onclick="loadContent('youtube')">
                    <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                    <span>YouTube</span>
                </div>
            </div>
        </div>

        <div class="view-frame-wrapper hidden" id="frame-panel">
            <div class="frame-controls">
                <button class="control-btn" onclick="refreshFrame()">Refresh</button>
                <button class="control-btn" onclick="showHome()">Close</button>
            </div>
            <iframe src="" id="display-window" class="view-frame"></iframe>
        </div>

    </div>

    <script>
        const homePanel = document.getElementById('home-panel');
        const framePanel = document.getElementById('frame-panel');
        const displayWindow = document.getElementById('display-window');
        
        // Define clean targets for your navigation hub
        const destinations = {
            'games': 'https://v6p9d9t4.ssl.hwcdn.net/html/1832043/index.html', // Example alternative embedded game frame URL
            'apps': 'https://www.wikipedia.org', // Stand-in safe container link
            'youtube': 'https://www.youtube.com/embed/' // Direct embed endpoint variant
        };

        function loadContent(target) {
            let url = destinations[target] || target;
            
            // Basic URL validation
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            displayWindow.src = url;
            homePanel.classList.add('hidden');
            framePanel.classList.remove('hidden');
            
            // Toggle sidebar active highlights
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            if(document.getElementById(`side-${target}`)) {
                document.getElementById(`side-${target}`).classList.add('active');
            }
        }

        function showHome() {
            displayWindow.src = "";
            framePanel.classList.add('hidden');
            homePanel.classList.remove('hidden');
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('side-home').add('active');
        }

        function refreshFrame() {
            displayWindow.contentWindow.location.reload();
        }

        // Built-in search engine routine
        function handleSearch(event) {
            if (event.key === 'Enter') {
                const query = document.getElementById('browser-search').value.trim();
                if (!query) return;

                // Check if user input looks like a direct domain URL
                const domainPattern = /^([a-zA-Z0-9-]+\.)+[a-zA-Z]{2,}(\/.*)?$/;
                
                if (query.startsWith('http://') || query.startsWith('https://') || domainPattern.test(query)) {
                    loadContent(query);
                } else {
                    // Fallback to query delivery via standard target
                    const searchUrl = `https://www.bing.com/search?q=${encodeURIComponent(query)}`;
                    loadContent(searchUrl);
                }
            }
        }
    </script>
</body>
</html>
